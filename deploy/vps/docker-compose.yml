services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: distribuidor-api
    env_file:
      - ../../backend/.env
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - distribuidor_net

  nginx:
    image: nginx:1.27-alpine
    container_name: distribuidor-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - distribuidor_net

networks:
  distribuidor_net:
    driver: bridge
