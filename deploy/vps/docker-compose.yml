services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: distribuidor-api
    env_file:
      - ../../backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    expose:
      - "8080"
    networks:
      - distribuidor_net

  nginx:
    image: nginx:1.27-alpine
    container_name: distribuidor-nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - distribuidor_net

networks:
  distribuidor_net:
    driver: bridge
